# harness-check - clean Pack repository CI
#
# Pack repositories intentionally exclude self-development design docs, PLANs,
# .ut-tdd runtime state, and persisted DB files. This workflow therefore checks
# the distributable CLI/setup surface instead of source-repo governance gates
# that require docs/design or docs/plans.
name: harness-check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: harness-check-${{ github.ref }}
  cancel-in-progress: true

jobs:
  harness-check:
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v5

      - name: setup bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3"

      - name: install deps (frozen)
        run: bun install --frozen-lockfile

      - name: typecheck (tsc --noEmit)
        run: bun run typecheck

      - name: pack smoke tests
        run: >
          bun run vitest run
          tests/setup.test.ts
          tests/distribution-acceptance.test.ts
          tests/skill-recommend.test.ts
          tests/skill-scaffold.test.ts
          tests/dependency-drift.test.ts
          --reporter=dot

      - name: lint (biome)
        run: bun run lint

      - name: setup smoke
        run: |
          bun src/cli.ts setup --solo
          bun .ut-tdd/bin/ut-tdd.mjs doctor --setup-smoke
